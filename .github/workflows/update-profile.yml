name: Update Profile Stats

on:
  schedule:
    - cron: "20 3,9,15,21 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_profile_stats.py"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

concurrency:
  group: update-profile-stats-${{ github.repository }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG profile and stats
        env:
          # Optional read-only PAT for contributions in repositories that the
          # repository-scoped GITHUB_TOKEN cannot access.
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_profile_stats.py

      - name: Commit updated SVG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            assets/profile-light.svg \
            assets/profile-dark.svg \
            assets/github-stats-light.svg \
            assets/github-stats-dark.svg

          if git diff --cached --quiet; then
            echo "No profile changes."
            exit 0
          fi

          git commit -m "chore: update dynamic profile stats"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; synchronizing main before retry."
            git pull --rebase origin main
            sleep 2
          done

          echo "Unable to push generated SVG files after 3 attempts."
          exit 1
