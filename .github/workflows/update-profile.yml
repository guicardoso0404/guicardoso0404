name: Update Profile Stats

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_profile_stats.py"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG profile and stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_profile_stats.py

      - name: Commit updated SVG files
        run: |
          if git diff --quiet -- assets/profile-light.svg assets/profile-dark.svg assets/github-stats-light.svg assets/github-stats-dark.svg; then
            echo "No profile changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-light.svg assets/profile-dark.svg assets/github-stats-light.svg assets/github-stats-dark.svg
          git commit -m "chore: update dynamic profile stats"
          git push